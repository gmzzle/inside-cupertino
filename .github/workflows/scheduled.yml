name: Scheduled feeds

# Runs the aggregator hourly and the draft generator daily.
# Both commit their output back to the repo on `main`, which triggers
# Cloudflare Pages to rebuild and deploy automatically.

on:
  schedule:
    - cron: '15 * * * *'   # hourly — aggregator
    - cron: '0 13 * * *'   # daily at 13:00 UTC — draft generator
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'aggregate'
        type: choice
        options: [aggregate, draft]

# Hard cap any individual run. If anything hangs, kill it within 10 minutes.
# Normal runs take ~1 minute. This is just a safety net against runaway minutes.

jobs:
  aggregate:
    if: github.event.schedule == '15 * * * *' || github.event.inputs.job == 'aggregate'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run aggregate
      - name: Commit if changed
        timeout-minutes: 3
        run: |
          if [[ -z "$(git status --porcelain src/data/aggregator.json)" ]]; then
            echo "No aggregator changes."
            exit 0
          fi
          git config user.name  "inside-cupertino-bot"
          git config user.email "bot@insidecupertino.com"
          git add src/data/aggregator.json
          git commit -m "chore(aggregator): refresh feed [skip ci]"
          for i in 1 2 3; do
            timeout 30 git pull --rebase origin main || { echo "Pull failed"; sleep 5; continue; }
            timeout 30 git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 5))
          done
          echo "Push failed after 3 attempts."
          exit 1

  draft:
    if: github.event.schedule == '0 13 * * *' || github.event.inputs.job == 'draft'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      MAX_PER_RUN: '2'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run draft
      - name: Commit if changed
        timeout-minutes: 3
        run: |
          if [[ -z "$(git status --porcelain src/content/articles scripts/.drafted-urls.json)" ]]; then
            echo "No new drafts."
            exit 0
          fi
          git config user.name  "inside-cupertino-bot"
          git config user.email "bot@insidecupertino.com"
          git add src/content/articles scripts/.drafted-urls.json
          git commit -m "chore(drafts): new draft articles for review [skip ci]"
          for i in 1 2 3; do
            timeout 30 git pull --rebase origin main || { echo "Pull failed"; sleep 5; continue; }
            timeout 30 git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 5))
          done
          echo "Push failed after 3 attempts."
          exit 1
